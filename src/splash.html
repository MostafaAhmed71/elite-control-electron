<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحميل...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(20, 184, 166, 0.12) 0%, transparent 60%);
      animation: bgPulse 4s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Logo ring */
    .logo-ring {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .logo-ring svg {
      position: absolute;
      inset: 0;
      animation: spin 2.5s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-inner {
      position: absolute;
      inset: 14px;
      background: linear-gradient(135deg, #6366f1, #14b8a6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
    }

    /* Title */
    .title {
      text-align: center;
    }

    .title h1 {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #a5b4fc, #5eead4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .title p {
      font-size: 13px;
      color: #64748b;
      font-weight: 400;
    }

    /* Progress section */
    .progress-section {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #14b8a6);
      border-radius: 999px;
      transition: width 0.6s ease;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
    }

    /* Service status items */
    .services {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .service-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      transition: all 0.4s ease;
    }

    .service-item.active {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.3);
    }

    .service-item.done {
      background: rgba(20, 184, 166, 0.08);
      border-color: rgba(20, 184, 166, 0.3);
    }

    .service-icon {
      font-size: 20px;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }

    .service-info {
      flex: 1;
    }

    .service-name {
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .service-status {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .service-item.active .service-status { color: #818cf8; }
    .service-item.done .service-status { color: #2dd4bf; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
      transition: all 0.4s ease;
    }

    .service-item.active .status-dot {
      background: #6366f1;
      animation: dotPulse 1s ease-in-out infinite;
    }

    .service-item.done .status-dot {
      background: #14b8a6;
      animation: none;
    }

    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.5); opacity: 0.6; }
    }

    /* Status text */
    .status-text {
      font-size: 13px;
      color: #475569;
      text-align: center;
      min-height: 20px;
      transition: all 0.3s ease;
    }

    /* Version */
    .version {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo-ring">
      <svg viewBox="0 0 110 110" fill="none">
        <circle cx="55" cy="55" r="50" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="12 6" />
        <defs>
          <linearGradient id="grad1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#14b8a6" />
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-inner">🎓</div>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>كنترول نخبة الشمال</h1>
      <p>نظام إدارة الاختبارات المتكامل</p>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>

      <div class="services">
        <div class="service-item" id="svc-omr">
          <div class="service-icon">🔬</div>
          <div class="service-info">
            <div class="service-name">محرك التصحيح الآلي</div>
            <div class="service-status" id="status-omr">في الانتظار...</div>
          </div>
          <div class="status-dot"></div>
        </div>

        <div class="service-item" id="svc-wa">
          <div class="service-icon">💬</div>
          <div class="service-info">
            <div class="service-name">خادم WhatsApp</div>
            <div class="service-status" id="status-wa">في الانتظار...</div>
          </div>
          <div class="status-dot"></div>
        </div>

        <div class="service-item" id="svc-app">
          <div class="service-icon">🖥️</div>
          <div class="service-info">
            <div class="service-name">واجهة التحكم</div>
            <div class="service-status" id="status-app">في الانتظار...</div>
          </div>
          <div class="status-dot"></div>
        </div>
      </div>

      <div class="status-text" id="mainStatus">جاري بدء الخدمات...</div>
    </div>
  </div>

  <div class="version">Elite Control v1.0.0</div>

  <script>
    // Receive status updates from main process via IPC
    // The main process will use executeJavaScript to update the UI

    function setStep(step, progress) {
      const items = ['omr', 'wa', 'app'];

      items.forEach((id, index) => {
        const el = document.getElementById('svc-' + id);
        el.className = 'service-item';
        if (index < step) {
          el.classList.add('done');
          document.getElementById('status-' + id).textContent = 'جاهز ✓';
        } else if (index === step) {
          el.classList.add('active');
        }
      });

      document.getElementById('progressBar').style.width = progress + '%';
    }

    // Start animation sequence
    setTimeout(() => setStep(0, 20), 300);

    // Expose update function for main process
    window.updateStatus = function(step, statusText) {
      const progressMap = [20, 60, 90, 100];
      setStep(step, progressMap[step] || 100);
      document.getElementById('mainStatus').textContent = statusText;
    };
  </script>
</body>
</html>
